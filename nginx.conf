# 정적 SPA 서빙 (non-root nginx = 8080). SPA fallback + 정적 자산 캐시.
server {
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;
    absolute_redirect off;   # 리다이렉트를 상대경로로 (앞단 TLS/게이트웨이 뒤라 내부 8080/http 유출 방지)
    port_in_redirect off;

    # 돌잔치 영상 전용 페이지 (탭 없는 단독 페이지) — SPA fallback 보다 먼저.
    location = /video { return 302 /video/; }
    location /video/ { try_files $uri $uri/ /video/index.html; }

    # 돌잔치 영상 스트림 — yooahn(내부) /api/dol 프록시(ceph-api presign+Range).
    #   S3(내부)를 외부에 노출하지 않고, 외부 invitation.leedemas.com 이 프록시.
    location = /dol {
        proxy_pass http://yooahn.live.svc.home.cluster.local:3000/api/dol;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header Content-Disposition 'inline; filename="yooahn-1year.mp4"' always;
    }

    # SPA: 없는 경로는 index.html 로 (클라 라우팅 안전)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 해시된 CRA 정적 자산 장기 캐시
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
