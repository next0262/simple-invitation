# 정적 SPA 서빙 (non-root nginx = 8080). SPA fallback + 정적 자산 캐시.
server {
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA: 없는 경로는 index.html 로 (클라 라우팅 안전)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 해시된 CRA 정적 자산 장기 캐시
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
